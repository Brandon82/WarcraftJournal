name: Update raider.io top routes

on:
  schedule:
    # Daily at 06:00 UTC — low-traffic window, and gives raider.io time
    # to ingest the prior day's runs into its world rankings.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-raiderio-routes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run raider.io route scraper
        run: npx tsx scripts/fetch-raiderio-routes.ts

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- src/data/generated/raiderio-routes.json; then
            echo "No changes; skipping commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/data/generated/raiderio-routes.json
          git commit -m "Update raider.io top routes ($(date -u +%Y-%m-%d))"
          git push
